<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventur - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" />
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="stylesheet" href="../assets/css/app.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body class="min-w-80 bg-inventur-bg font-sans text-inventur-text antialiased">
    <div class="app-shell grid min-h-screen grid-cols-[250px_minmax(0,1fr)] max-[980px]:grid-cols-1">
      <aside class="app-sidebar sticky top-0 z-20 flex h-screen flex-col border-r border-inventur-border bg-white max-[980px]:static max-[980px]:h-auto">
        <a class="app-logo flex h-[82px] items-center border-b border-inventur-border px-6 py-5 max-[980px]:h-auto" href="./dashboard.html"><img src="../assets/img/Logo.svg" alt="Inventur" /></a>
        <nav class="app-nav flex flex-1 flex-col gap-[22px] p-[26px_22px] max-[980px]:grid max-[980px]:grid-cols-2">
          <section class="nav-group grid gap-2.5 border-b border-inventur-border pb-5 last:border-b-0"><p class="nav-label m-0 text-xs font-bold leading-[18px] text-inventur-heading">Main</p><a class="nav-link active flex min-h-[50px] items-center gap-3 rounded-lg px-3.5 text-sm font-semibold" href="./dashboard.html"><img src="../assets/img/icons/layout-grid.svg" alt="" />Dashboard</a></section>
          <section class="nav-group grid gap-2.5 border-b border-inventur-border pb-5 last:border-b-0"><p class="nav-label m-0 text-xs font-bold leading-[18px] text-inventur-heading">Inventory</p><a class="nav-link flex min-h-[50px] items-center gap-3 rounded-lg px-3.5 text-sm font-semibold" href="./products.html"><img src="../assets/img/icons/box.svg" alt="" />Products</a></section>
          <section class="nav-group grid gap-2.5 border-b border-inventur-border pb-5 last:border-b-0"><p class="nav-label m-0 text-xs font-bold leading-[18px] text-inventur-heading">Reports</p><a class="nav-link flex min-h-[50px] items-center gap-3 rounded-lg px-3.5 text-sm font-semibold" href="./invoice-reports.html"><img src="../assets/img/icons/invoice-report.svg" alt="" />Invoice Report</a></section>
          <section class="nav-group grid gap-2.5 border-b border-inventur-border pb-5 last:border-b-0"><p class="nav-label m-0 text-xs font-bold leading-[18px] text-inventur-heading">Settings</p><a class="nav-link flex min-h-[50px] items-center gap-3 rounded-lg px-3.5 text-sm font-semibold" href="./sign-in.html"><img src="../assets/img/icons/logout.svg" alt="" />Logout</a></section>
        </nav>
      </aside>
      <main class="app-main flex min-w-0 flex-col">
        <header class="app-topbar flex min-h-[82px] items-center justify-end gap-3.5 border-b border-inventur-border bg-white px-8 py-4 max-[980px]:flex-wrap max-[980px]:justify-start"><a class="btn btn-navy inline-flex min-h-11 items-center justify-center gap-2 rounded-md px-[18px] text-sm font-semibold" href="./pos.html"><img src="../assets/img/icons/device-laptop.svg" alt="" />POS</a></header>
        <section class="app-content dashboard-page min-w-0 px-8 py-7 max-[980px]:p-5">
          <div class="dashboard-greeting card rounded-lg border border-inventur-border bg-white shadow-inventur">
            <h1>👋 Hi User, <span>here's what's happening with your store today.</span></h1>
            <div class="page-actions">
              <button class="btn"><img src="../assets/img/icons/Calendar Icon.svg" alt="" />01 Jan 2024 - 07 Jan 2024</button>
              <button class="icon-btn"><img src="../assets/img/icons/Refresh Icon.svg" alt="" /></button>
              <button class="icon-btn"><img src="../assets/img/icons/chevron-up.svg" alt="" /></button>
            </div>
          </div>
          <div class="metric-grid">
            <article class="earning-card card">
              <div>
                <p>Weekly Earning</p>
                <strong>$95000.45</strong>
                <span>⌃ 48% increase compare to last week</span>
              </div>
              <img src="../assets/img/backgrounds/compared to last week.png" alt="" />
            </article>
            <article class="metric-card sales-card">
              <img src="../assets/img/icons/image 3 (traced).svg" alt="" />
              <strong>10,000+</strong>
              <span>No of Total Sales</span>
              <img class="refresh" src="../assets/img/icons/Refresh Icon.svg" alt="" />
            </article>
            <article class="metric-card purchase-card">
              <img src="../assets/img/icons/image 4 (traced).svg" alt="" />
              <strong>800+</strong>
              <span>No of Purchased Goods</span>
              <img class="refresh" src="../assets/img/icons/Refresh Icon.svg" alt="" />
            </article>
          </div>
        </section>
      </main>
    </div>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
