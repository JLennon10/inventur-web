<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventur - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" />
    <link rel="stylesheet" href="../assets/css/app.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar">
        <a class="app-logo" href="./dashboard.html"><img src="../assets/img/Logo.svg" alt="Inventur" /></a>
        <nav class="app-nav">
          <section class="nav-group"><p class="nav-label">Main</p><a class="nav-link active" href="./dashboard.html"><img src="../assets/img/icons/layout-grid.svg" alt="" />Dashboard</a></section>
          <section class="nav-group"><p class="nav-label">Inventory</p><a class="nav-link" href="./products.html"><img src="../assets/img/icons/box.svg" alt="" />Products</a></section>
          <section class="nav-group"><p class="nav-label">Reports</p><a class="nav-link" href="./invoice-reports.html"><img src="../assets/img/icons/invoice-report.svg" alt="" />Invoice Report</a></section>
          <section class="nav-group"><p class="nav-label">Settings</p><a class="nav-link" href="./sign-in.html"><img src="../assets/img/icons/logout.svg" alt="" />Logout</a></section>
        </nav>
      </aside>
      <main class="app-main">
        <header class="app-topbar"><a class="btn btn-navy" href="./pos.html"><img src="../assets/img/icons/device-laptop.svg" alt="" />POS</a></header>
        <section class="app-content dashboard-page">
          <div class="dashboard-greeting card">
            <h1>👋 Hi User, <span>here's what's happening with your store today.</span></h1>
            <div class="page-actions">
              <button class="btn"><img src="../assets/img/icons/Calendar Icon.svg" alt="" />01 Jan 2024 - 07 Jan 2024</button>
              <button class="icon-btn"><img src="../assets/img/icons/Refresh Icon.svg" alt="" /></button>
              <button class="icon-btn"><img src="../assets/img/icons/chevron-up.svg" alt="" /></button>
            </div>
          </div>
          <div class="metric-grid">
            <article class="earning-card card">
              <div>
                <p>Weekly Earning</p>
                <strong>$95000.45</strong>
                <span>⌃ 48% increase compare to last week</span>
              </div>
              <img src="../assets/img/backgrounds/compared to last week.png" alt="" />
            </article>
            <article class="metric-card sales-card">
              <img src="../assets/img/icons/image 3 (traced).svg" alt="" />
              <strong>10,000+</strong>
              <span>No of Total Sales</span>
              <img class="refresh" src="../assets/img/icons/Refresh Icon.svg" alt="" />
            </article>
            <article class="metric-card purchase-card">
              <img src="../assets/img/icons/image 4 (traced).svg" alt="" />
              <strong>800+</strong>
              <span>No of Purchased Goods</span>
              <img class="refresh" src="../assets/img/icons/Refresh Icon.svg" alt="" />
            </article>
          </div>
        </section>
      </main>
    </div>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
