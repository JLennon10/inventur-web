<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventur - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" />
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="stylesheet" href="../assets/css/app.css" />
    <link rel="stylesheet" href="../assets/css/sign-in.css" />
  </head>
  <body class="min-w-80 bg-inventur-bg font-sans text-inventur-text antialiased">
    <main class="signin-page grid min-h-screen justify-items-center overflow-hidden px-5 py-[88px]">
      <img class="signin-logo z-[1] mb-16 w-[300px] max-[620px]:mb-9 max-[620px]:w-[220px]" src="../assets/img/Logo.svg" alt="Inventur" />
      <section class="signin-card card z-[1] w-full max-w-[500px] rounded-lg border border-inventur-border bg-white p-10 shadow-inventur max-[620px]:p-7">
        <h1>Sign In</h1>
        <p>Access the Inventur panel using your email and passcode.</p>
        <form>
          <label><span class="field-label">Email <span class="required">*</span></span><div class="signin-input"><input type="email" /><img src="../assets/img/icons/mail.svg" alt="" /></div></label>
          <label><span class="field-label">Password <span class="required">*</span></span><div class="signin-input"><input type="password" /><img src="../assets/img/icons/eye-off.svg" alt="" /></div></label>
          <label class="remember"><input type="checkbox" checked /> Remember Me</label>
          <button class="btn btn-primary signin-submit" type="button">Sign In</button>
          <div class="divider"><span></span>OR<span></span></div>
          <button class="google-button" type="button"><img src="../assets/img/icons/Google Logo.svg" alt="Google" /></button>
        </form>
      </section>
    </main>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/sign-in.js"></script>
  </body>
</html>
